<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>my-tool</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f5;
      color: #222;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .hero {
      text-align: center;
      max-width: 600px;
      padding: 2rem;
    }
    h1 {
      font-size: 2.8rem;
      font-weight: 700;
      margin-bottom: 1rem;
      color: #1a1a2e;
    }
    p {
      font-size: 1.1rem;
      line-height: 1.7;
      color: #555;
      margin-bottom: 2rem;
    }
    .cta {
      display: inline-block;
      background: #4f46e5;
      color: #fff;
      padding: 0.85rem 2rem;
      border-radius: 8px;
      text-decoration: none;
      font-size: 1rem;
      font-weight: 600;
      transition: background 0.2s;
    }
    .cta:hover { background: #4338ca; }
  </style>
</head>
<body>
  <div class="hero">
    <h1>Hello Vercel</h1>
    <p>作業を素早く、シンプルに。<br>my-tool はあなたの日常タスクをもっとスムーズにするための開発ツールです。</p>
    <a class="cta" href="https://github.com/h9are0ku8-lgtm/my-tool">GitHub で見る</a>
  </div>
</body>
</html>
